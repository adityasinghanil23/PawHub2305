<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawHub – Love. Care. Play.</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    body {
      background: #f9f5f0;
      color: #2d2d2d;
      overflow-x: hidden;
    }

    /* Marquee sliding text */
    .marquee {
      background: #f47c20;
      color: white;
      font-size: 22px;
      font-weight: bold;
      padding: 12px 0;
      overflow: hidden;
      white-space: nowrap;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: slide 15s linear infinite;
    }
    @keyframes slide {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* Floating paws in hero */
    .floating-paws {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .paw {
      position: absolute;
      font-size: 3rem;
      opacity: 0.25;
      color: white;
      animation: float 18s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-30vh) rotate(360deg); }
    }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.78);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.06);
    }
    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      color: #f47c20;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: transform 0.4s ease;
    }
    .logo:hover { transform: scale(1.08) rotate(4deg); }
    nav {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }
    nav a {
      color: #2d2d2d;
      font-weight: 600;
      text-decoration: none;
      font-size: 1.05rem;
      position: relative;
      transition: color 0.3s;
    }
    nav a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -6px;
      left: 0;
      background: #f47c20;
      transition: width 0.3s ease;
    }
    nav a:hover::after { width: 100%; }
    nav a:hover { color: #f47c20; }
    .signin-btn {
      background: #f47c20;
      color: white;
      border: none;
      padding: 0.65rem 1.6rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(244,124,32,0.3);
    }
    .signin-btn:hover {
      background: #e0661a;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(244,124,32,0.4);
    }
    #welcomeMsg {
      font-weight: 600;
      color: #f47c20;
      font-size: 1.1rem;
      margin-right: 20px;
    }
    #cart-link {
      font-size: 1.8rem;
      color: #2d2d2d;
      position: relative;
      transition: color 0.3s;
    }
    #cart-link:hover { color: #f47c20; }
    #cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #f47c20;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.8rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* Modal Styles (for Sign In popup) */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      max-width: 450px;
      width: 90%;
      position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 2.2rem;
      cursor: pointer;
      color: #aaa;
    }
    .close:hover { color: #f47c20; }
    .form-group {
      margin-bottom: 1.6rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 600;
      color: #1e3a5f;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Hero - your previous style + image */
    .hero {
      height: 520px;
      background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.45)),
                  url('images/hero.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      padding-left: 80px;
      position: relative;
      color: white;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 650px;
    }
    .hero h1 {
      font-size: 50px;
      color: #fdf6ec;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
      margin-bottom: 15px;
      line-height: 1.1;
    }
    .hero h1 span {
      color: #f47c20;
    }
    .hero p {
      margin: 15px 0 25px;
      font-size: 20px;
      color: white;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    }
    .primary-btn {
      background: #f47c20;
      color: white;
      padding: 12px 28px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(244,124,32,0.4);
    }
    .primary-btn:hover {
      background: #e0661a;
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(244,124,32,0.5);
    }

    /* Cards - 2×2 grid */
    .highlight-section {
      padding: 80px 5%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2.5rem;
      background: linear-gradient(to bottom, #fff8f0, #f9f5f0);
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .highlight-section {
        grid-template-columns: 1fr;
        padding: 4rem 5%;
      }
    }
    .highlight-card {
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 50px rgba(0,0,0,0.1);
      transition: all 0.4s ease;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .highlight-card:hover {
      transform: translateY(-16px) scale(1.03);
      box-shadow: 0 30px 70px rgba(0,0,0,0.18);
      border-color: #f47c20;
    }
    .card-image img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      transition: transform 0.7s ease;
    }
    .highlight-card:hover .card-image img {
      transform: scale(1.1);
    }
    .card-content {
      padding: 2rem;
      text-align: center;
    }
    .card-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #1e3a5f;
    }
    .card-btn {
      background: white;
      color: #f47c20;
      border: 2px solid #f47c20;
      padding: 0.9rem 2.2rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .card-btn:hover {
      background: #f47c20;
      color: white;
      transform: scale(1.08);
    }

    /* Story */
    .story-section {
      height: 520px;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
                  url('images/story.jpg') center/cover no-repeat fixed;
      display: flex;
      align-items: center;
      padding: 0 8%;
      color: white;
      position: relative;
    }
    .story-text {
      background: rgba(255,255,255,0.94);
      padding: 3.5rem;
      border-radius: 24px;
      max-width: 620px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 50px rgba(0,0,0,0.35);
    }
    .story-text h4 { color: #f47c20; font-size: 1.5rem; margin-bottom: 1rem; }
    .story-text h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: #1e3a5f; }

    /* Responsive */
    @media (max-width: 900px) {
      .navbar { flex-direction: column; padding: 1rem 5%; gap: 1.2rem; }
      .hero { height: 80vh; padding: 0 5%; text-align: center; }
      .story-section { height: auto; padding: 5rem 5%; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- Floating paws -->
  <div class="floating-paws">
    <div class="paw" style="left:8%; animation-delay:0s;">🐾</div>
    <div class="paw" style="left:28%; animation-delay:5s;">🐶</div>
    <div class="paw" style="left:50%; animation-delay:9s;">🐱</div>
    <div class="paw" style="left:70%; animation-delay:3s;">💕</div>
    <div class="paw" style="left:85%; animation-delay:7s;">🐾</div>
  </div>

  <!-- Sliding welcome text -->
  <div class="marquee">
    <span>Welcome pet loversssss 🐶🐱🐾💕  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
  </div>

  <header class="navbar">
    <div class="logo">🐾 PawHub</div>
    <nav>
      <a href="#">Home</a>
      <a href="about.html">About Us</a>

      <!-- Sign In Button -->
      <button class="signin-btn" id="signinBtn" onclick="openSignInModal()">Sign In</button>

      <!-- Welcome message after sign in -->
      <span id="welcomeMsg" style="display:none; font-weight:600; color:#f47c20; margin-right:20px;">
        Hi, <span id="userName"></span>!
      </span>

      <a href="cart.html" id="cart-link">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count">0</span>
      </a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to <span>PawHub!</span></h1>
      <p>Your Guide to the Best Products, Grooming & Care for Your Pets</p>
      <a href="#" class="primary-btn">Shop Deals ></a>
    </div>
  </section>

  <section class="highlight-section">
    <a href="toys-accessories.html" class="highlight-card orange">
      <div class="card-image">
        <img src="deals.jpg" alt="Toys and Accessories">
      </div>
      <div class="card-content">
        <h3 class="card-title">Toys & Accessories</h3>
        <button class="card-btn">Explore ></button>
      </div>
    </a>
    <a href="food.html" class="highlight-card green">
      <div class="card-image">
        <img src="reviews.jpg" alt="Food Products">
      </div>
      <div class="card-content">
        <h3 class="card-title">Food Products</h3>
        <button class="card-btn">Shop Now ></button>
      </div>
    </a>
    <a href="grooming.html" class="highlight-card purple">
      <div class="card-image">
        <img src="grooming.jpg" alt="Grooming Services">
      </div>
      <div class="card-content">
        <h3 class="card-title">Grooming Services</h3>
        <button class="card-btn">Book Now ></button>
      </div>
    </a>
    <a href="adopt.html" class="highlight-card blue">
      <div class="card-image">
        <img src="adoption.jpg" alt="Adopt Us">
      </div>
      <div class="card-content">
        <h3 class="card-title">Adopt Us</h3>
        <button class="card-btn">Adopt me ></button>
      </div>
    </a>
  </section>

  <!-- Sign In Modal -->
  <div id="signInModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span class="close" onclick="closeSignInModal()">×</span>
      <h2>Sign In / Register</h2>

      <form id="signInForm">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" required placeholder="Your full name">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" required placeholder="+91-XXXXXXXXXX">
        </div>

        <div class="form-group">
          <label for="address">Address *</label>
          <textarea id="address" rows="3" required placeholder="Your full address (e.g. Flat 101, XYZ Society, Mumbai)"></textarea>
        </div>

        <button type="submit" class="primary-btn" style="width:100%; margin-top:20px;">Submit</button>
      </form>
    </div>
  </div>

  <script>
    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('pawhubCart')) || [];
      const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      document.getElementById('cart-count').textContent = total;
      document.getElementById('cart-count').classList.toggle('visible', total > 0);
    }
    window.addEventListener('load', updateCartCount);

    // Sign In Modal Controls
    function openSignInModal() {
      document.getElementById('signInModal').style.display = 'flex';
    }

    function closeSignInModal() {
      document.getElementById('signInModal').style.display = 'none';
    }

    // Handle form submission
    document.getElementById('signInForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();

      if (name) {
        // Show welcome message
        document.getElementById('userName').textContent = name;
        document.getElementById('welcomeMsg').style.display = 'inline';

        // Hide Sign In button
        document.getElementById('signinBtn').style.display = 'none';

        // Close modal
        closeSignInModal();

        // Optional success message
        alert(`Welcome, ${name}! You are now signed in. 🐾`);
      }
    });

    // Close modal on outside click
    window.onclick = function(event) {
      const modal = document.getElementById('signInModal');
      if (event.target === modal) {
        closeSignInModal();
      }
    };
  </script>
</body>
</html>
