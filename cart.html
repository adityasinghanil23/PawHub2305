<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart – PawHub</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3eee8;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #f47c20;
      text-align: center;
      margin-bottom: 30px;
    }
    .empty {
      text-align: center;
      padding: 80px 0;
      color: #777;
      font-size: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f8f8f8;
      color: #1e3a5f;
    }
    .price, .subtotal {
      color: #f47c20;
      font-weight: bold;
    }
    .total-row {
      font-size: 22px;
      font-weight: bold;
      background: #fff8f0;
      padding: 18px;
      text-align: right;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    /* Payment Options */
    .payment-section {
      margin: 30px 0;
      padding: 25px;
      background: #f8f8f8;
      border-radius: 12px;
      border: 2px solid #eee;
    }
    .payment-title {
      font-size: 18px;
      margin-bottom: 15px;
      color: #1e3a5f;
    }
    .payment-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .payment-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .payment-option:hover {
      border-color: #f47c20;
    }
    .payment-option.selected {
      border-color: #28a745;
      background: #f0fdf4;
    }
    .payment-option input[type="radio"] {
      accent-color: #28a745;
      transform: scale(1.3);
    }
    .option-label {
      font-size: 16px;
      font-weight: 500;
    }
    .cod-badge {
      background: #28a745;
      color: white;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: auto;
    }
    .actions {
      margin-top: 30px;
      text-align: center;
    }
    .btn {
      background: #f47c20;
      color: white;
      padding: 14px 32px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      margin: 0 12px;
    }
    .btn.clear {
      background: #6c757d;
    }
    .btn.checkout {
      background: #28a745;
      font-size: 18px;
      padding: 16px 50px;
    }
    .btn.checkout:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Your Cart</h1>
    <div id="cart-content"></div>
    <div id="cart-total" class="total-row"></div>

    <!-- Payment Options Section -->
    <div class="payment-section" id="payment-section" style="display: none;">
      <div class="payment-title">Select Payment Method</div>
      <div class="payment-options">
        
        <!-- Cash on Delivery -->
        <label class="payment-option" id="cod-option">
          <input type="radio" name="payment" value="cod" checked>
          <span class="option-label">Cash on Delivery (COD)</span>
          <span class="cod-badge">Recommended</span>
        </label>

        <!-- UPI -->
        <label class="payment-option" id="upi-option">
          <input type="radio" name="payment" value="upi">
          <span class="option-label">UPI Payment (PhonePe, Google Pay, Paytm)</span>
        </label>

        <!-- Credit/Debit Card -->
        <label class="payment-option" id="card-option">
          <input type="radio" name="payment" value="card">
          <span class="option-label">Credit or Debit Card</span>
        </label>

      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="window.location.href='index.html'">Continue Shopping</button>
      <button class="btn clear" onclick="clearCart()">Clear Cart</button>
      <button class="btn checkout" id="checkoutBtn" onclick="proceedToCheckout()">Proceed to Checkout</button>
    </div>
  </div>

  <script>
    let selectedPayment = "cod";

    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('pawhubCart')) || [];
      const content = document.getElementById('cart-content');
      const totalDiv = document.getElementById('cart-total');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const paymentSection = document.getElementById('payment-section');

      content.innerHTML = '';

      if (cart.length === 0) {
        content.innerHTML = '<p class="empty">Your cart is empty.<br>Add some toys, food or grooming services!</p>';
        totalDiv.style.display = 'none';
        checkoutBtn.style.display = 'none';
        paymentSection.style.display = 'none';
        return;
      }

      let grandTotal = 0;
      let table = `
        <table>
          <thead>
            <tr>
              <th>Item / Service</th>
              <th>Unit Price (₹)</th>
              <th>Quantity</th>
              <th>Subtotal (₹)</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
      `;

      cart.forEach((item, index) => {
        const price = item.price || 0;
        const qty = item.quantity || 1;
        const subtotal = price * qty;
        grandTotal += subtotal;

        table += `
          <tr>
            <td>${item.name}</td>
            <td class="price">₹${price}</td>
            <td>${qty}</td>
            <td class="subtotal">₹${subtotal}</td>
            <td><button class="remove-btn" onclick="removeItem(${index})">Remove</button></td>
          </tr>
        `;
      });

      table += `</tbody></table>`;
      content.innerHTML = table;

      totalDiv.textContent = `Grand Total: ₹${grandTotal}`;
      totalDiv.style.display = 'block';
      checkoutBtn.style.display = 'inline-block';
      paymentSection.style.display = 'block';
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('pawhubCart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('pawhubCart', JSON.stringify(cart));
      renderCart();
    }

    function clearCart() {
      if (confirm('Clear entire cart?')) {
        localStorage.removeItem('pawhubCart');
        renderCart();
      }
    }

    function proceedToCheckout() {
      const cart = JSON.parse(localStorage.getItem('pawhubCart')) || [];
      if (cart.length === 0) return;

      let message = "🎉 Order placed successfully!\n\n";

      if (selectedPayment === "cod") {
        message += "Payment Method: Cash on Delivery (COD)\nYour order will be delivered soon.";
      } else if (selectedPayment === "upi") {
        message += "Payment Method: UPI\nPlease complete the payment using the UPI link sent to your phone.";
      } else if (selectedPayment === "card") {
        message += "Payment Method: Credit/Debit Card\nYou will be redirected to the secure payment gateway.";
      }

      message += "\n\nThank you for shopping at PawHub! 🐾";

      alert(message);

      // Clear cart after successful order
      localStorage.removeItem('pawhubCart');

      // Redirect to home page (index.html) as requested
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 800);
    }

    // Handle payment option selection
    document.addEventListener('DOMContentLoaded', () => {
      const options = {
        cod: document.getElementById('cod-option'),
        upi: document.getElementById('upi-option'),
        card: document.getElementById('card-option')
      };

      Object.keys(options).forEach(key => {
        options[key].addEventListener('click', () => {
          document.querySelectorAll('.payment-option').forEach(opt => {
            opt.classList.remove('selected');
          });
          options[key].classList.add('selected');
          selectedPayment = key;
        });
      });

      // Set COD as default
      options.cod.classList.add('selected');
      selectedPayment = "cod";

      renderCart();
    });
  </script>
</body>
</html>
